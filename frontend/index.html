<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyEntraQuery - Enterprise AI Chat</title>
    <link rel="stylesheet" href="/css/styles.css">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button id="sidebar-toggle" class="icon-button" aria-label="Toggle sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="app-title">MyEntraQuery</h1>
                <span class="agent-badge">EnterpriseAgent</span>
            </div>
            <div class="top-bar-right">
                <button id="theme-toggle" class="icon-button" aria-label="Toggle theme">
                    <svg id="theme-icon-light" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg id="theme-icon-dark" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <button id="logout-button" class="text-button">Logout</button>
                </div>
            </div>
        </header>

        <div class="main-content">
            <!-- Sidebar for conversation history -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <button id="new-conversation-button" class="primary-button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        New Conversation
                    </button>
                </div>
                <div class="sidebar-content">
                    <div id="conversation-list" class="conversation-list">
                        <!-- Conversations will be loaded here -->
                    </div>
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-container">
                <div id="chat-messages" class="chat-messages">
                    <div class="welcome-message">
                        <h2>Welcome to MyEntraQuery</h2>
                        <p>Start a conversation with EnterpriseAgent. You can ask questions, upload files (CSV, Excel, DOCX, PDF), and get intelligent responses.</p>
                    </div>
                </div>

                <!-- Typing Indicator -->
                <div id="typing-indicator" class="typing-indicator" style="display: none;">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>

                <!-- Input Area -->
                <div class="input-container">
                    <div class="file-upload-area" id="file-upload-area" style="display: none;">
                        <div class="file-chip">
                            <span id="file-name"></span>
                            <button id="remove-file" class="remove-file-button">×</button>
                        </div>
                    </div>
                    <div class="input-bar">
                        <input type="file" id="file-input" accept=".csv,.xlsx,.xls,.docx,.pdf" style="display: none;">
                        <button id="file-upload-button" class="icon-button" aria-label="Upload file">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                        <textarea id="message-input" class="message-input" placeholder="Type your message..." rows="1"></textarea>
                        <button id="send-button" class="icon-button send-button" aria-label="Send message">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <!-- Scripts -->
    <script src="/js/auth.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/history.js"></script>
    <script src="/js/fileUpload.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
